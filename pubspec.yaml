name: flutter_chat_mvp
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  file_picker: any
  open_file: any
  provider: any
  cupertino_icons: any
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  image_picker: any
  firebase_storage: any
  intl: any
  google_fonts: any
  permission_handler: any
  path_provider: any
  flutter_sound: any
  audio_session: any
  http: any
  mime: any
  # gallery_saver: any
  share_plus: any
  firebase_messaging: any
  flutter_local_notifications: any
  firebase_database: any
  firebase_app_check: any
  google_sign_in: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8
  analyzer: ^7.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
  # To add custom fonts to your application, add a fonts section here,
